version: '3.8'

services:
  backend:
    build: ./backend
    container_name: laoz-lms-backend
    ports:
      - "3000:3000"
    volumes:
      - ./content:/app/content/courses
      - ./backend/lms.db:/app/lms.db
    environment:
      - PORT=3000
      - HOST=0.0.0.0
      - NODE_ENV=production
      - CONTENT_BASE_PATH=./content/courses
      - DATABASE_URL=file:./lms.db
      - JWT_SECRET=change_me_in_production
      - CORS_ORIGIN=*

  frontend:
    build: ./frontend
    container_name: laoz-lms-frontend
    ports:
      - "80:80"
    depends_on:
      - backend

networks:
  default:
    driver: bridge
