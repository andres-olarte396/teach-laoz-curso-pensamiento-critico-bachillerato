<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cazador de Fakes - Módulo 3</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f1f5f9;
            --accent-color: #6366f1; /* Indigo */
            --danger-color: #ef4444;
            --success-color: #22c55e;
            --muted-color: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: var(--accent-color);
            margin: 0;
            font-size: 2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .score-board {
            display: flex;
            gap: 20px;
            background: rgba(255,255,255,0.05);
            padding: 10px 20px;
            border-radius: 50px;
            margin-top: 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .phone-frame {
            width: 400px;
            max-width: 100%;
            background-color: #000;
            border-radius: 30px;
            padding: 10px;
            border: 4px solid #334155;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .app-screen {
            background-color: var(--bg-color);
            border-radius: 20px;
            height: 650px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .app-header {
            padding: 15px;
            border-bottom: 1px solid #334155;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(5px);
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .feed-container {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            position: relative;
        }

        .post-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            border: 1px solid #334155;
            transition: transform 0.3s ease;
        }

        .post-header {
            display: flex;
            align-items: center;
            margin-bottom: 10px;
        }

        .post-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: #475569;
            margin-right: 10px;
        }

        .post-author {
            font-weight: bold;
            font-size: 0.9rem;
            display: block;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--muted-color);
        }

        .post-content img {
            width: 100%;
            border-radius: 10px;
            margin-top: 10px;
            background-color: #334155;
            min-height: 150px;
            object-fit: cover;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
        }

        .post-text {
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 10px 0;
        }

        .actions-bar {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 20px;
            z-index: 20;
            padding-bottom: 20px;
            background: linear-gradient(to top, var(--bg-color) 20%, transparent);
        }

        .btn-action {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
        }

        .btn-fake {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-real {
            background-color: var(--success-color);
            color: white;
        }

        .btn-action:hover { transform: scale(1.1); }
        
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
            text-align: center;
            padding: 20px;
        }

        .stamp {
            font-size: 3rem;
            font-weight: 900;
            text-transform: uppercase;
            border: 5px solid;
            padding: 10px 20px;
            border-radius: 10px;
            transform: rotate(-10deg);
            margin-bottom: 20px;
            animation: stampIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .stamp-fake { color: var(--danger-color); border-color: var(--danger-color); }
        .stamp-real { color: var(--success-color); border-color: var(--success-color); }

        @keyframes stampIn {
            from { transform: scale(2) rotate(0deg); opacity: 0; }
            to { transform: scale(1) rotate(-10deg); opacity: 1; }
        }

        .explanation {
            font-size: 1rem;
            color: #cbd5e1;
            margin-bottom: 20px;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 10px;
        }

        .hidden { display: none !important; }

    </style>
</head>
<body>

    <header>
        <h1>🕵️‍♂️ Cazador de Fakes</h1>
        <div class="score-board">
            <span>Aciertos: <b id="score">0</b></span>
            <span>Nivel: <b id="level-display">1</b>/4</span>
        </div>
    </header>

    <div class="phone-frame">
        <div class="app-screen">
            <div class="app-header">
                <span style="font-weight:bold;">Feed Noticias</span>
                <span>📶</span>
            </div>

            <div class="feed-container" id="feed">
                <!-- Posts injected here -->
            </div>

            <div class="actions-bar" id="controls">
                <button class="btn-action btn-fake" onclick="checkPost(false)">❌<div>Fake</div></button>
                <button class="btn-action btn-real" onclick="checkPost(true)">✅<div>Real</div></button>
            </div>

            <!-- Feedback Overlay -->
            <div id="feedback-overlay" class="overlay hidden">
                <div id="stamp" class="stamp">FAKE</div>
                <div id="feedback-text" class="explanation"></div>
                <button class="btn-action btn-real" style="width: auto; padding: 0 30px; border-radius: 10px;" onclick="nextPost()">Siguiente</button>
            </div>
            
            <!-- Result Overlay -->
             <div id="result-overlay" class="overlay hidden">
                <h2>¡Turno Terminado!</h2>
                <p id="final-score-text"></p>
                <div class="explanation">Si dudas, NO COMPARTAS. Ese es el superpoder.</div>
                <button class="btn-action btn-real" style="width: auto; padding: 0 30px; border-radius: 10px;" onclick="location.reload()">Jugar de Nuevo</button>
            </div>
        </div>
    </div>

    <script>
        const posts = [
            {
                author: "Tía Gertrudis",
                avatarColor: "#eab308",
                time: "Hace 2 min",
                text: "¡URGENTE! 🚨 Científicos de Japón dicen que beber agua caliente con limón cura TODAS las enfermedades. ¡Compartan antes de que lo borren!",
                imageAlt: "Imagen genérica de limones con texto en rojo",
                isReal: false,
                reason: "Promesa milagrosa ('cura todas'), urgencia ('compartan ya'), falta de fuente específica ('científicos de Japón' sin enlace). Típica cadena falsa."
            },
            {
                author: "Noticias Ciencia Hoy",
                avatarColor: "#3b82f6",
                time: "Hace 1 hora",
                text: "La NASA confirma el descubrimiento de un nuevo exoplaneta potencialmente habitable a 100 años luz de la Tierra. Fuente oficial en enlace.",
                imageAlt: "Ilustración artística de un planeta azul",
                isReal: true,
                reason: "Lenguaje moderado ('potencialmente habitable'), cita una fuente oficial verificable (NASA) y no pide compartir con urgencia."
            },
            {
                author: "El Ojo que Todo lo Ve",
                avatarColor: "#a855f7",
                time: "Hace 4 horas",
                text: "MIRA lo que el gobierno te oculta. Esta foto muestra el incendio de hoy en el parque central causado por satélites.",
                imageAlt: "Foto de un incendio forestal",
                isReal: false,
                reason: "Si haces Búsqueda Inversa de la imagen, verás que esa foto es de un incendio en California en 2015. Sacada de contexto (Fake News de Contexto)."
            },
            {
                author: "Dr. Juan Pérez",
                avatarColor: "#10b981",
                time: "Hace 1 día",
                text: "Lavarse las manos reduce significativamente el riesgo de contagio de virus. Estudio publicado en The Lancet.",
                imageAlt: "Infografía sobre lavado de manos",
                isReal: true,
                reason: "Afirmación respaldada por consenso médico y cita una revista científica prestigiosa (The Lancet). Sentido común."
            }
        ];

        let currentPostIndex = 0;
        let score = 0;

        function loadPost() {
            if (currentPostIndex >= posts.length) {
                showFinalResults();
                return;
            }

            const post = posts[currentPostIndex];
            const container = document.getElementById('feed');
            
            container.innerHTML = `
                <div class="post-card fade-in">
                    <div class="post-header">
                        <div class="post-avatar" style="background-color: ${post.avatarColor}"></div>
                        <div>
                            <span class="post-author">${post.author}</span>
                            <span class="post-time">${post.time}</span>
                        </div>
                    </div>
                    <div class="post-text">${post.text}</div>
                    <div class="post-content">
                        <!-- Placeholder for image to keep file simple -->
                        <div style="background:#334155; height:150px; border-radius:10px; display:flex; align-items:center; justify-content:center; color:#94a3b8; font-style:italic;">
                            [${post.imageAlt}]
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('level-display').innerText = currentPostIndex + 1;
        }

        function checkPost(userThinksReal) {
            const post = posts[currentPostIndex];
            const isCorrect = userThinksReal === post.isReal;
            
            const overlay = document.getElementById('feedback-overlay');
            const stamp = document.getElementById('stamp');
            const text = document.getElementById('feedback-text');
            
            overlay.classList.remove('hidden');
            
            if (post.isReal) {
                stamp.className = "stamp stamp-real";
                stamp.innerText = "VERDAD";
            } else {
                stamp.className = "stamp stamp-fake";
                stamp.innerText = "FAKE";
            }

            if (isCorrect) {
                score++;
                document.getElementById('score').innerText = score;
                text.innerHTML = `✅ <b>¡Bien detectado!</b><br><br>${post.reason}`;
            } else {
                text.innerHTML = `❌ <b>Te engañaron...</b><br><br>${post.reason}`;
            }
        }

        function nextPost() {
            document.getElementById('feedback-overlay').classList.add('hidden');
            currentPostIndex++;
            loadPost();
        }
        
        function showFinalResults() {
             document.getElementById('controls').classList.add('hidden');
             const resOverlay = document.getElementById('result-overlay');
             resOverlay.classList.remove('hidden');
             
             let msg = "";
             if (score === posts.length) msg = "¡ERES UN CAZADOR DE ÉLITE! 🦅";
             else if (score >= posts.length / 2) msg = "Buen olfato, pero cuidado. 🤔";
             else msg = "El algoritmo te ha comido. 🧟";
             
             document.getElementById('final-score-text').innerHTML = `Puntuación: ${score}/${posts.length}<br><br>${msg}`;
        }

        // Init
        loadPost();

    </script>
</body>
</html>
