<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Neon Glow Filter -->
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Glass Gradient for background -->
    <linearGradient id="glassGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:0.8" />
    </linearGradient>

    <!-- Cap Gradient (Cyan to Purple) -->
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38bdf8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>

    <!-- Book Cover Gradient -->
    <linearGradient id="bookGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#64748b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#475569;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle (Glass style) -->
  <circle cx="60" cy="60" r="55" fill="url(#glassGradient)" stroke="#38bdf8" stroke-width="1.5" stroke-opacity="0.3" />
  
  <!-- Book Base (Dark Tech Style) -->
  <g transform="translate(0, 5)">
      <!-- Book spine/back -->
      <path d="M 35 68 L 38 45 L 60 42 L 82 45 L 85 68 L 60 72 Z" fill="#334155" />
      
      <!-- Pages (White/Cyan tint) -->
      <path d="M 38 45 L 60 43 L 60 65 L 35 68 Z" fill="#f8fafc" opacity="0.9"/>
      <path d="M 60 43 L 82 45 L 85 68 L 60 65 Z" fill="#e2e8f0" opacity="0.9"/>
      
      <!-- Tech Lines on Pages -->
      <line x1="42" y1="50" x2="55" y2="49" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
      <line x1="42" y1="54" x2="55" y2="53" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
      <line x1="42" y1="58" x2="55" y2="57" stroke="#38bdf8" stroke-width="1" opacity="0.4" />

      <line x1="65" y1="49" x2="78" y2="50" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
      <line x1="65" y1="53" x2="78" y2="54" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
      <line x1="65" y1="57" x2="78" y2="58" stroke="#38bdf8" stroke-width="1" opacity="0.4" />
  </g>

  <!-- Graduation Cap (Neon) -->
  <g filter="url(#neon-glow)">
    <!-- Cap Board -->
    <path d="M 60 20 L 25 35 L 60 50 L 95 35 Z" fill="url(#capGradient)" stroke="#c084fc" stroke-width="1"/>
    
    <!-- Tassel -->
    <circle cx="60" cy="20" r="2" fill="#38bdf8" />
    <line x1="95" y1="35" x2="95" y2="55" stroke="#38bdf8" stroke-width="2" />
    <circle cx="95" cy="55" r="3" fill="#38bdf8" />
  </g>

  <!-- Floating Particles (Knowledge) -->
  <circle cx="20" cy="30" r="2" fill="#38bdf8" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="80" r="1.5" fill="#818cf8" opacity="0.8">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- Code/Tech Accent -->
  <text x="50" y="95" font-family="monospace" font-size="8" fill="#94a3b8" letter-spacing="2">&lt;/&gt;</text>
</svg>
